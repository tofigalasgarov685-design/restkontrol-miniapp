<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RestKontrol</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f6f7f9;
      color: #111827;
      padding: 20px;
    }

    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 18px;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 26px;
      font-weight: bold;
    }

    h1 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #4b5563;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: #111827;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .trial {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #16a34a;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">R</div>
    <h1>RestKontrol</h1>
    <p>
      Yeme-içme işletmeleri için dijital kontrol sistemi.<br>
      Açılış, kapanış, görev ve fotoğraflı doğrulamaları yönetin.
    </p>

    <button class="btn btn-primary" onclick="alert('İşletme oluşturma ekranı sonra eklenecek')">
      İşletme Oluştur
    </button>

    <button class="btn btn-secondary" onclick="alert('Katılım ekranı sonra eklenecek')">
      Mevcut İşletmeye Katıl
    </button>

    <div class="trial">7 gün ücretsiz deneme</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
  </script>
</body>
</html>
