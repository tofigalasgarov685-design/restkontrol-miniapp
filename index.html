<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RestKontrol</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f6f7f9;
      color: #111827;
      padding: 20px;
    }

    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #4b5563;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input, select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-primary {
      background: #111827;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .info {
      margin-top: 16px;
      font-size: 13px;
      color: #16a34a;
      text-align: center;
      font-weight: 600;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .zone-box {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .zone-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .field {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="step1" class="step active">
      <h1>İşletme Oluştur</h1>
      <p>Hızlı başlangıç için temel bilgileri girin.</p>

      <div class="field">
        <label>İşletme adı</label>
        <input type="text" id="businessName" placeholder="Örn: Matryoshka Cafe" />
      </div>

      <div class="field">
        <label>İşletme türü</label>
        <select id="businessType">
          <option value="">Seçiniz</option>
          <option>Restoran</option>
          <option>Kafe</option>
          <option>Fırın / Bakery</option>
          <option>Delivery Kitchen</option>
          <option>Fast Food</option>
          <option>Coffee Shop</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label>Açılış saati</label>
          <input type="time" id="openTime" />
        </div>

        <div class="field">
          <label>Kapanış saati</label>
          <input type="time" id="closeTime" />
        </div>
      </div>

      <button class="btn btn-primary" onclick="goToStep2()">Devam Et</button>
      <div class="info">7 gün ücretsiz deneme</div>
    </div>

    <div id="step2" class="step">
      <h1>Bölümler</h1>
      <p>Her bölüm için minimum vardiya personel sayısını girin.</p>

      <div class="zone-box">
        <div class="zone-title">Mutfak</div>
        <div class="field">
          <label>Minimum personel</label>
          <input type="number" id="kitchenMin" min="0" value="0" />
        </div>
      </div>

      <div class="zone-box">
        <div class="zone-title">Salon</div>
        <div class="field">
          <label>Minimum personel</label>
          <input type="number" id="hallMin" min="0" value="0" />
        </div>
      </div>

      <div class="zone-box">
        <div class="zone-title">Bar</div>
        <div class="field">
          <label>Minimum personel</label>
          <input type="number" id="barMin" min="0" value="0" />
        </div>
      </div>

      <div class="zone-box">
        <div class="zone-title">Paket Servis</div>
        <div class="field">
          <label>Minimum personel</label>
          <input type="number" id="deliveryMin" min="0" value="0" />
        </div>
      </div>

      <button class="btn btn-secondary" onclick="goToStep1()">Geri</button>
      <button class="btn btn-primary" onclick="finishSetup()">Kurulumu Tamamla</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    function showStep(stepId) {
      document.querySelectorAll(".step").forEach(step => step.classList.remove("active"));
      document.getElementById(stepId).classList.add("active");
    }

    function goToStep2() {
      const name = document.getElementById("businessName").value.trim();
      const type = document.getElementById("businessType").value;
      const openTime = document.getElementById("openTime").value;
      const closeTime = document.getElementById("closeTime").value;

      if (!name || !type || !openTime || !closeTime) {
        alert("Lütfen tüm alanları doldurun.");
        return;
      }

      showStep("step2");
    }

    function goToStep1() {
      showStep("step1");
    }

    function finishSetup() {
      const name = document.getElementById("businessName").value.trim();
      const type = document.getElementById("businessType").value;
      const openTime = document.getElementById("openTime").value;
      const closeTime = document.getElementById("closeTime").value;

      const kitchenMin = document.getElementById("kitchenMin").value;
      const hallMin = document.getElementById("hallMin").value;
      const barMin = document.getElementById("barMin").value;
      const deliveryMin = document.getElementById("deliveryMin").value;

      alert(
        "Kurulum tamamlandı:\\n\\n" +
        "İşletme: " + name + "\\n" +
        "Tür: " + type + "\\n" +
        "Saat: " + openTime + " - " + closeTime + "\\n\\n" +
        "Mutfak: " + kitchenMin + "\\n" +
        "Salon: " + hallMin + "\\n" +
        "Bar: " + barMin + "\\n" +
        "Paket Servis: " + deliveryMin
      );
    }
  </script>
</body>
</html>
