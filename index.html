<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RestKontrol</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f6f7f9;
      color: #111827;
      padding: 20px;
    }

    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #4b5563;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input, select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      background: #111827;
      color: white;
    }

    .info {
      margin-top: 16px;
      font-size: 13px;
      color: #16a34a;
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>İşletme Oluştur</h1>
    <p>
      Hızlı başlangıç için temel bilgileri girin.
    </p>

    <div class="field">
      <label>İşletme adı</label>
      <input type="text" id="businessName" placeholder="Örn: Matryoshka Cafe" />
    </div>

    <div class="field">
      <label>İşletme türü</label>
      <select id="businessType">
        <option value="">Seçiniz</option>
        <option>Restoran</option>
        <option>Kafe</option>
        <option>Fırın / Bakery</option>
        <option>Delivery Kitchen</option>
        <option>Fast Food</option>
        <option>Coffee Shop</option>
      </select>
    </div>

    <div class="field">
      <label>Açılış saati</label>
      <input type="time" id="openTime" />
    </div>

    <div class="field">
      <label>Kapanış saati</label>
      <input type="time" id="closeTime" />
    </div>

    <button class="btn" onclick="createBusiness()">Devam Et</button>

    <div class="info">7 gün ücretsiz deneme</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    function createBusiness() {
      const name = document.getElementById("businessName").value;
      const type = document.getElementById("businessType").value;
      const openTime = document.getElementById("openTime").value;
      const closeTime = document.getElementById("closeTime").value;

      if (!name || !type || !openTime || !closeTime) {
        alert("Lütfen tüm alanları doldurun.");
        return;
      }

      alert(
        "İşletme oluşturuldu:\n\n" +
        "Ad: " + name + "\n" +
        "Tür: " + type + "\n" +
        "Açılış: " + openTime + "\n" +
        "Kapanış: " + closeTime
      );
    }
  </script>
</body>
</html>
